<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Panel - RIASEC</title>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js"
      }
    }
  </script>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    body {
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    }
    h1 {
      color: #2c3e50;
      border-bottom: 3px solid #e74c3c;
      padding-bottom: 12px;
    }
    .back-link {
      display: inline-block;
      margin-bottom: 20px;
      color: #3498db;
      text-decoration: none;
      font-weight: bold;
    }
    .back-link:hover {
      text-decoration: underline;
    }
    .login-box {
      max-width: 400px;
      margin: 40px auto;
      padding: 30px;
      background: #f8f9fa;
      border-radius: 12px;
    }
    .login-box input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .login-box button {
      width: 100%;
      padding: 12px;
      background: #e74c3c;
      color: white;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      cursor: pointer;
    }
    .login-box button:hover {
      background: #c0392b;
    }
    .logout-btn {
      float: right;
      background: #e74c3c;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
    }
    .refresh-btn {
      float: right;
      background: #2ecc71;
      color: white;
      border: none;
      padding: 6px 16px;
      border-radius: 20px;
      cursor: pointer;
      margin-right: 10px;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 14px;
      margin-top: 20px;
    }
    th {
      background: #2c3e50;
      color: white;
      padding: 12px 8px;
      text-align: left;
    }
    td {
      padding: 10px 8px;
      border-bottom: 1px solid #ecf0f1;
    }
    tr:hover {
      background: #f1f9ff;
    }
    .badge {
      display: inline-block;
      background: #3498db;
      color: white;
      border-radius: 12px;
      padding: 2px 10px;
      font-weight: bold;
    }
    .btn-hapus {
      background: #e74c3c;
      color: white;
      border: none;
      padding: 4px 12px;
      border-radius: 12px;
      cursor: pointer;
      font-size: 12px;
      font-weight: bold;
    }
    .btn-hapus:hover {
      background: #c0392b;
    }
    .btn-hapus:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
    }
    .loading {
      text-align: center;
      padding: 40px;
      color: #7f8c8d;
      font-size: 18px;
    }
    .error {
      color: #e74c3c;
      text-align: center;
      padding: 20px;
    }
    @media (max-width: 700px) {
      table,
      thead,
      tbody,
      th,
      td,
      tr {
        display: block;
      }
      thead tr {
        display: none;
      }
      tr {
        margin-bottom: 15px;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 10px;
      }
      td {
        border: none;
        padding: 6px 10px;
      }
      td::before {
        content: attr(data-label);
        font-weight: bold;
        display: inline-block;
        width: 120px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <a href="index.html" class="back-link">⬅ Kembali ke Halaman Tes</a>

    <!-- LOGIN ADMIN -->
    <div id="loginSection">
      <div class="login-box">
        <h2 style="text-align:center; margin-top:0;">🔐 Login Admin</h2>
        <input type="email" id="adminEmail" placeholder="Email Admin" value="admin@riasec.com" />
        <input type="password" id="adminPassword" placeholder="Password" />
        <button id="loginBtn">Masuk</button>
        <div id="loginError" style="color:red; text-align:center; margin-top:10px;"></div>
      </div>
    </div>

    <!-- DATA PESERTA (hanya tampil jika login sebagai admin) -->
    <div id="dataSection" style="display:none;">
      <div style="display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap;">
        <h1>👤 Panel Admin — Data Peserta</h1>
        <div>
          <button class="refresh-btn" id="refreshBtn">↻ Muat Ulang</button>
          <button class="logout-btn" id="logoutBtn">🚪 Keluar</button>
        </div>
      </div>
      <div id="adminStatus" style="color:green; margin-bottom:10px;">✅ Login sebagai Admin</div>
      <div id="loadingMessage" class="loading">⏳ Memuat data...</div>
      <div id="tableWrapper" style="display:none;">
        <div style="overflow-x:auto;">
          <table id="dataTable">
            <thead>
              <tr>
                <th>#</th>
                <th>Nama</th>
                <th>Pendidikan</th>
                <th>Umur</th>
                <th>R</th>
                <th>I</th>
                <th>A</th>
                <th>S</th>
                <th>E</th>
                <th>C</th>
                <th>Waktu</th>
                <th>Aksi</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div id="totalCount" style="margin-top:15px; color:#7f8c8d;"></div>
      </div>
    </div>
  </div>

  <script type="module">
    // ============================================================
    // 1. IMPOR FIREBASE SDK
    // ============================================================
    import { initializeApp } from 'firebase/app';
    import {
      getAuth,
      signInWithEmailAndPassword,
      onAuthStateChanged,
      signOut
    } from 'firebase/auth';
    import {
      getFirestore,
      collection,
      query,
      orderBy,
      getDocs,
      deleteDoc,
      doc
    } from 'firebase/firestore';

    // ============================================================
    // 2. KONFIGURASI FIREBASE (dari Anda)
    // ============================================================
    const firebaseConfig = {
      apiKey: 'AIzaSyCU-KgCUo-ma5chOEVpnZ2ycpVWC2spIg8',
      authDomain: 'tes-riasec-rana.firebaseapp.com',
      projectId: 'tes-riasec-rana',
      storageBucket: 'tes-riasec-rana.firebasestorage.app',
      messagingSenderId: '940488035527',
      appId: '1:940488035527:web:2157e4235363cc4f4802e2'
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ============================================================
    // 3. EMAIL ADMIN YANG DIIZINKAN
    // ============================================================
    const ADMIN_EMAIL = 'admin@riasec.com';

    // ============================================================
    // 4. ELEMEN DOM
    // ============================================================
    const loginSection = document.getElementById('loginSection');
    const dataSection = document.getElementById('dataSection');
    const loginError = document.getElementById('loginError');
    const loadingMsg = document.getElementById('loadingMessage');
    const tableWrapper = document.getElementById('tableWrapper');
    const tableBody = document.getElementById('tableBody');
    const totalCount = document.getElementById('totalCount');

    // ============================================================
    // 5. CEK STATUS LOGIN SAAT HALAMAN DIMUAT
    // ============================================================
    onAuthStateChanged(auth, async (user) => {
      if (user && user.email === ADMIN_EMAIL) {
        loginSection.style.display = 'none';
        dataSection.style.display = 'block';
        loadData();
      } else if (user) {
        loginSection.style.display = 'block';
        dataSection.style.display = 'none';
        loginError.innerText = '⚠️ Akun ini bukan admin. Silakan login dengan akun admin.';
        await signOut(auth);
      } else {
        loginSection.style.display = 'block';
        dataSection.style.display = 'none';
        loginError.innerText = '';
      }
    });

    // ============================================================
    // 6. LOGIN ADMIN
    // ============================================================
    document.getElementById('loginBtn').addEventListener('click', async () => {
      const email = document.getElementById('adminEmail').value;
      const password = document.getElementById('adminPassword').value;
      loginError.innerText = '⏳ Memproses...';

      try {
        const cred = await signInWithEmailAndPassword(auth, email, password);
        if (cred.user.email !== ADMIN_EMAIL) {
          await signOut(auth);
          loginError.innerText = '❌ Email ini bukan admin terdaftar.';
        } else {
          loginError.innerText = '';
          // onAuthStateChanged akan menangani sisanya
        }
      } catch (error) {
        loginError.innerText = '❌ Gagal login: ' + error.message;
      }
    });

    // ============================================================
    // 7. LOGOUT
    // ============================================================
    document.getElementById('logoutBtn').addEventListener('click', async () => {
      await signOut(auth);
      loginSection.style.display = 'block';
      dataSection.style.display = 'none';
      loginError.innerText = '';
    });

    // ============================================================
    // 8. FUNGSI LOAD DATA (khusus admin)
    // ============================================================
    async function loadData() {
      loadingMsg.style.display = 'block';
      tableWrapper.style.display = 'none';

      try {
        const q = query(
          collection(db, 'riasec_results'),
          orderBy('timestamp', 'desc')
        );
        const snapshot = await getDocs(q);

        if (snapshot.empty) {
          loadingMsg.innerHTML = '📭 Belum ada data peserta.';
          tableWrapper.style.display = 'none';
          return;
        }

        let html = '';
        let count = 0;
        snapshot.forEach(docSnap => {
          count++;
          const data = docSnap.data();
          const docId = docSnap.id;
          const scores = data.scores || {};
          const waktu = data.timestamp?.toDate?.()
            ? data.timestamp.toDate().toLocaleString('id-ID')
            : 'Tidak diketahui';

          html += `
            <tr data-id="${docId}">
              <td data-label="#">${count}</td>
              <td data-label="Nama"><strong>${escapeHtml(data.nama || '-')}</strong></td>
              <td data-label="Pendidikan">${escapeHtml(data.pendidikan || '-')}</td>
              <td data-label="Umur">${data.umur || '-'}</td>
              <td data-label="R"><span class="badge">${scores.R ?? 0}</span></td>
              <td data-label="I"><span class="badge">${scores.I ?? 0}</span></td>
              <td data-label="A"><span class="badge">${scores.A ?? 0}</span></td>
              <td data-label="S"><span class="badge">${scores.S ?? 0}</span></td>
              <td data-label="E"><span class="badge">${scores.E ?? 0}</span></td>
              <td data-label="C"><span class="badge">${scores.C ?? 0}</span></td>
              <td data-label="Waktu">${waktu}</td>
              <td data-label="Aksi">
                <button class="btn-hapus" data-id="${docId}">🗑️ Hapus</button>
              </td>
            </tr>
          `;
        });

        tableBody.innerHTML = html;
        totalCount.textContent = `Total peserta: ${count} orang.`;
        loadingMsg.style.display = 'none';
        tableWrapper.style.display = 'block';

        // Pasang event listener untuk tombol hapus
        document.querySelectorAll('.btn-hapus').forEach(btn => {
          btn.addEventListener('click', handleDelete);
        });

      } catch (error) {
        console.error('Gagal ambil data:', error);
        loadingMsg.innerHTML =
          '❌ Gagal memuat data. Pastikan Anda login sebagai admin dan aturan keamanan sudah benar.<br>' +
          error.message;
        tableWrapper.style.display = 'none';
      }
    }

    // ============================================================
    // 9. FUNGSI HAPUS DATA
    // ============================================================
    async function handleDelete(e) {
      const btn = e.currentTarget;
      const docId = btn.getAttribute('data-id');
      if (!docId) return;

      // Konfirmasi
      if (!confirm('Apakah Anda yakin ingin menghapus data ini? Tindakan ini tidak dapat dibatalkan.')) {
        return;
      }

      btn.disabled = true;
      btn.textContent = '⏳';

      try {
        const docRef = doc(db, 'riasec_results', docId);
        await deleteDoc(docRef);
        console.log(`Dokumen ${docId} berhasil dihapus.`);
        // Hapus baris dari tabel tanpa reload seluruh data
        const row = btn.closest('tr');
        if (row) {
          row.remove();
          // Perbarui nomor urut dan total count
          updateRowNumbersAndCount();
        }
        // Tampilkan pesan sukses
        alert('Data berhasil dihapus!');
      } catch (error) {
        console.error('Gagal hapus:', error);
        alert('Gagal menghapus data: ' + error.message);
        btn.disabled = false;
        btn.textContent = '🗑️ Hapus';
      }
    }

    // ============================================================
    // 10. UPDATE NOMOR URUT & TOTAL COUNT
    // ============================================================
    function updateRowNumbersAndCount() {
      const rows = tableBody.querySelectorAll('tr');
      rows.forEach((row, index) => {
        const td = row.querySelector('td[data-label="#"]');
        if (td) td.textContent = index + 1;
      });
      totalCount.textContent = `Total peserta: ${rows.length} orang.`;
      if (rows.length === 0) {
        tableWrapper.style.display = 'none';
        loadingMsg.innerHTML = '📭 Semua data telah dihapus.';
        loadingMsg.style.display = 'block';
      }
    }

    // ============================================================
    // 11. UTILITY: escapeHtml
    // ============================================================
    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    // ============================================================
    // 12. TOMBOL REFRESH
    // ============================================================
    document.getElementById('refreshBtn').addEventListener('click', loadData);
  </script>
</body>
</html>
