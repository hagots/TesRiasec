<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tes Minat RIASEC</title>
  <script type="importmap">
    {
      "imports": {
        "firebase/app": "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js",
        "firebase/auth": "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js",
        "firebase/firestore": "https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js"
      }
    }
  </script>
  <style>
    * {
      box-sizing: border-box;
      font-family: 'Segoe UI', Tahoma, sans-serif;
    }
    body {
      background: #f5f7fa;
      margin: 0;
      padding: 20px;
    }
    .container {
      max-width: 900px;
      margin: auto;
      background: white;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
    }
    h1 {
      text-align: center;
      color: #2c3e50;
      border-bottom: 3px solid #3498db;
      padding-bottom: 12px;
    }
    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-weight: 600;
      margin-bottom: 5px;
      color: #2c3e50;
    }
    .form-group input,
    .form-group select {
      width: 100%;
      padding: 12px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 16px;
    }
    .btn-primary {
      background: #3498db;
      color: white;
      border: none;
      padding: 14px 28px;
      border-radius: 30px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      width: 100%;
      transition: 0.2s;
    }
    .btn-primary:hover {
      background: #2980b9;
    }
    .btn-primary:disabled {
      background: #bdc3c7;
      cursor: not-allowed;
    }
    .question-block {
      margin: 20px 0;
      padding: 12px 16px;
      background: #f8fafc;
      border-radius: 10px;
      border-left: 4px solid #3498db;
    }
    .question-text {
      font-size: 16px;
      margin-bottom: 8px;
    }
    .options label {
      margin-right: 20px;
      cursor: pointer;
    }
    .options input[type="radio"] {
      margin-right: 4px;
    }
    .results {
      margin-top: 30px;
      padding: 20px;
      background: #eaf2f8;
      border-radius: 12px;
      display: none;
    }
    .result-item {
      background: white;
      padding: 16px 20px;
      margin: 12px 0;
      border-radius: 10px;
      border-left: 8px solid #3498db;
      box-shadow: 0 2px 6px rgba(0, 0, 0, 0.05);
    }
    .result-item h3 {
      margin: 0;
    }
    .result-item .score {
      font-weight: bold;
      color: #e67e22;
      font-size: 1.2em;
    }
    .result-item .desc {
      margin-top: 8px;
      color: #34495e;
      line-height: 1.6;
    }
    .rank-badge {
      display: inline-block;
      background: #2c3e50;
      color: white;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      text-align: center;
      line-height: 28px;
      font-weight: bold;
      margin-right: 12px;
    }
    .footer {
      text-align: center;
      margin-top: 30px;
      color: #7f8c8d;
      font-size: 0.9em;
    }
    .hidden {
      display: none;
    }
    .admin-link {
      text-align: right;
      margin-bottom: 10px;
    }
    .admin-link a {
      color: #7f8c8d;
      text-decoration: none;
      font-size: 0.9em;
    }
    .admin-link a:hover {
      color: #3498db;
    }
    .user-status {
      text-align: center;
      color: #555;
      margin-bottom: 20px;
    }
    @media (max-width: 600px) {
      .options label {
        display: inline-block;
        margin-right: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="admin-link"><a href="admin.html" target="_blank">👤 Admin Panel</a></div>
    <h1>Tes Minat Bakat</h1>

    <!-- Status Sesi -->
    <div class="user-status" id="userStatus">Menyiapkan sesi aman...</div>

    <!-- FORM REGISTRASI PESERTA -->
    <div id="registrationForm">
      <div class="form-group">
        <label>Nama Lengkap</label>
        <input type="text" id="nama" placeholder="Masukkan nama Anda" required />
      </div>
      <div class="form-group">
        <label>Jenjang Pendidikan</label>
        <select id="pendidikan">
          <option value="SMP">SMP</option>
          <option value="SMA/SMK">SMA/SMK</option>
          <option value="D3">D3</option>
          <option value="S1/D4">S1/D4</option>
          <option value="S2">S2</option>
          <option value="S3">S3</option>
          <option value="Bekerja">Bekerja</option>
        </select>
      </div>
      <div class="form-group">
        <label>Umur (tahun)</label>
        <input type="number" id="umur" placeholder="Contoh: 22" min="1" max="120" required />
      </div>
      <button class="btn-primary" id="startBtn">Mulai Tes</button>
    </div>

    <!-- KONTENER SOAL (acak, tanpa label kategori) -->
    <div id="testContainer" class="hidden">
      <div id="questionsContainer"></div>
      <button class="btn-primary" id="submitBtn">Lihat Hasil & Simpan</button>
    </div>

    <!-- KONTENER HASIL -->
    <div class="results" id="resultsContainer">
      <h2 style="text-align:center; color:#2c3e50;">Hasil Minat Saya</h2>
      <div id="resultList"></div>
      <p style="text-align:center; margin-top:20px; color:#2c3e50;">
        ✅ Data Anda telah tersimpan dengan aman.
      </p>
    </div>

    <div class="footer">
      Berdasarkan teori Holland · Kode minat membantu menemukan jurusan/karier yang cocok.
    </div>
  </div>

  <script type="module">
    // ============================================================
    // 1. IMPOR FIREBASE
    // ============================================================
    import { initializeApp } from 'firebase/app';
    import {
      getAuth,
      signInAnonymously,
      onAuthStateChanged
    } from 'firebase/auth';
    import {
      getFirestore,
      collection,
      addDoc,
      serverTimestamp
    } from 'firebase/firestore';

    // ============================================================
    // 2. KONFIGURASI FIREBASE (dari Anda)
    // ============================================================
    const firebaseConfig = {
      apiKey: 'AIzaSyCU-KgCUo-ma5chOEVpnZ2ycpVWC2spIg8',
      authDomain: 'tes-riasec-rana.firebaseapp.com',
      projectId: 'tes-riasec-rana',
      storageBucket: 'tes-riasec-rana.firebasestorage.app',
      messagingSenderId: '940488035527',
      appId: '1:940488035527:web:2157e4235363cc4f4802e2'
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // ============================================================
    // 3. LOGIN ANONIM OTOMATIS
    // ============================================================
    let currentUid = null;
    const userStatusEl = document.getElementById('userStatus');

    onAuthStateChanged(auth, async (user) => {
      if (user) {
        currentUid = user.uid;
        userStatusEl.innerHTML = `✅ Sesi aman aktif (ID: ${currentUid.substring(0, 8)}...)`;
      } else {
        try {
          const cred = await signInAnonymously(auth);
          currentUid = cred.user.uid;
          userStatusEl.innerHTML = `✅ Sesi anonim aktif (ID: ${currentUid.substring(0, 8)}...)`;
        } catch (error) {
          console.error('Gagal login anonim:', error);
          userStatusEl.innerHTML = '❌ Gagal membuat sesi aman. Refresh halaman.';
        }
      }
    });

    // ============================================================
    // 4. DATA KATEGORI & PERTANYAAN (VERSI BARU)
    // ============================================================
    const categories = [{
      id: 'R',
      label: 'Realistik (R)',
      desc: 'Orang Realistik sering pandai dalam pekerjaan mekanik atau atletik. Jurusan: Pertanian, Asisten Kesehatan, Komputer, Konstruksi, Mekanik/Mesin, Teknik, Makanan dan Perhotelan. Jalur: Kesehatan, Bisnis, Industri & Teknologi Rekayasa.',
      questions: [
        'Saya suka mengutak-atik mobil atau motor',
        'Saya suka membuat sesuatu',
        'Saya suka merawat hewan',
        'Saya suka merakit atau menyusun sesuatu',
        'Saya suka memasak',
        'Saya adalah orang yang praktis',
        'Saya suka bekerja di luar ruangan'
      ]
    }, {
      id: 'I',
      label: 'Investigatif (I)',
      desc: 'Orang Investigatif suka mengamati, belajar, menganalisis dan memecahkan masalah. Jurusan: Biologi Kelautan, Teknik, Kimia, Zoologi, Kedokteran/Bedah, Ekonomi Konsumen, Psikologi. Jalur: Kesehatan, Bisnis, Industri & Teknologi Rekayasa.',
      questions: [
        'Saya suka mengerjakan teka-teki',
        'Saya suka melakukan eksperimen',
        'Saya menikmati sains',
        'Saya menikmati mencoba memahami cara kerja sesuatu',
        'Saya suka menganalisis berbagai hal (masalah/situasi)',
        'Saya suka bekerja dengan angka atau grafik',
        'Saya pandai matematika'
      ]
    }, {
      id: 'A',
      label: 'Artistik (A)',
      desc: 'Orang Artistik suka bekerja dalam situasi tidak terstruktur di mana mereka dapat menggunakan kreativitas mereka. Jurusan: Komunikasi, Tata Rias, Seni Pertunjukan, Fotografi, Radio dan TV, Desain Interior, Arsitektur. Jalur: Kesehatan, Bisnis, Industri & Teknologi Rekayasa.',
      questions: [
        'Saya pandai bekerja secara mandiri',
        'Saya suka membaca tentang seni dan musik',
        'Saya menikmati menulis kreatif',
        'Saya orang yang kreatif',
        'Saya suka memainkan alat musik atau bernyanyi',
        'Saya suka berakting dalam drama',
        'Saya suka menggambar'
      ]
    }, {
      id: 'S',
      label: 'Sosial (S)',
      desc: 'Orang Sosial suka bekerja dengan orang lain, daripada benda. Jurusan: Konseling, Keperawatan, Fisioterapi, Perjalanan/Travel, Periklanan, Hubungan Masyarakat, Pendidikan. Jalur: Kesehatan, Bisnis, Industri & Teknologi Rekayasa.',
      questions: [
        'Saya suka bekerja dalam tim',
        'Saya suka mengajar atau melatih orang lain',
        'Saya suka mencoba membantu orang lain memecahkan masalah mereka',
        'Saya tertarik untuk menyembuhkan orang',
        'Saya senang mempelajari budaya lain',
        'Saya suka terlibat dalam diskusi mengenai berbagai isu',
        'Saya suka membantu orang lain'
      ]
    }, {
      id: 'E',
      label: 'Enterprising (E)',
      desc: 'Orang Enterprising suka bekerja dengan orang lain dan menikmati membujuk serta tampil. Jurusan: Merchandising Busana, Real Estat, Pemasaran/Penjualan, Hukum, Ilmu Politik, Perdagangan Internasional, Perbankan/Keuangan. Jalur: Kesehatan, Bisnis, Industri & Teknologi Rekayasa.',
      questions: [
        'Saya orang yang ambisius dan saya menetapkan tujuan untuk diri sendiri',
        'Saya suka mencoba memengaruhi atau meyakinkan orang lain',
        'Saya suka menjual barang',
        'Saya cepat dalam mengambil tanggung jawab baru',
        'Saya ingin memulai bisnis sendiri',
        'Saya suka memimpin',
        'Saya suka berpidato'
      ]
    }, {
      id: 'C',
      label: 'Konvensional (C)',
      desc: 'Orang Konvensional sangat berorientasi pada detail, terorganisir dan suka bekerja dengan data. Jurusan: Akuntansi, Pencatatan Hukum, Asuransi, Administrasi, Rekam Medis, Perbankan, Pengolahan Data. Jalur: Kesehatan, Bisnis, Industri & Teknologi Rekayasa.',
      questions: [
        'Saya suka merapikan berbagai hal (berkas, meja/kantor)',
        'Saya suka mendapatkan instruksi yang jelas untuk diikuti',
        'Saya tidak keberatan bekerja 8 jam sehari di kantor',
        'Saya memperhatikan detail',
        'Saya suka mengarsipkan dokumen atau mengetik',
        'Saya pandai mencatat hasil kerja saya',
        'Saya ingin bekerja di kantor'
      ]
    }];

    // ============================================================
    // 5. FUNGSI ACK PERTANYAAN
    // ============================================================
    function buildShuffledQuestions() {
      const all = [];
      categories.forEach((cat, catIdx) => {
        cat.questions.forEach((text, qIdx) => {
          all.push({ catId: cat.id, catIdx, qIdx, text });
        });
      });
      // Fisher-Yates shuffle
      for (let i = all.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [all[i], all[j]] = [all[j], all[i]];
      }
      return all;
    }

    let shuffledQuestions = [];

    // ============================================================
    // 6. LOGIKA APLIKASI
    // ============================================================
    let pesertaData = {};

    const registrationForm = document.getElementById('registrationForm');
    const testContainer = document.getElementById('testContainer');
    const questionsContainer = document.getElementById('questionsContainer');
    const submitBtn = document.getElementById('submitBtn');
    const resultsContainer = document.getElementById('resultsContainer');
    const resultList = document.getElementById('resultList');

    // Tombol Mulai Tes
    document.getElementById('startBtn').addEventListener('click', function () {
      const nama = document.getElementById('nama').value.trim();
      const pendidikan = document.getElementById('pendidikan').value;
      const umur = parseInt(document.getElementById('umur').value);

      if (!nama) { alert('Nama wajib diisi!'); return; }
      if (!umur || umur < 1) { alert('Umur wajib diisi dengan angka yang valid!'); return; }

      pesertaData = { nama, pendidikan, umur };
      registrationForm.classList.add('hidden');
      testContainer.classList.remove('hidden');

      shuffledQuestions = buildShuffledQuestions();
      renderShuffledQuestions();
    });

    function renderShuffledQuestions() {
      questionsContainer.innerHTML = '';
      shuffledQuestions.forEach((item, index) => {
        const block = document.createElement('div');
        block.className = 'question-block';
        const qText = document.createElement('div');
        qText.className = 'question-text';
        qText.textContent = `${index + 1}. ${item.text}`;
        block.appendChild(qText);

        const optDiv = document.createElement('div');
        optDiv.className = 'options';
        const radioSet = [
          { value: '1', label: 'Setuju' },
          { value: '0', label: 'Tidak Setuju' }
        ];
        radioSet.forEach(r => {
          const label = document.createElement('label');
          const input = document.createElement('input');
          input.type = 'radio';
          input.name = `q_${index}`;
          input.value = r.value;
          label.appendChild(input);
          label.appendChild(document.createTextNode(' ' + r.label));
          optDiv.appendChild(label);
          optDiv.appendChild(document.createTextNode(' '));
        });
        block.appendChild(optDiv);
        questionsContainer.appendChild(block);
      });
    }

    // ============================================================
    // 7. SUBMIT & SIMPAN
    // ============================================================
    submitBtn.addEventListener('click', async function () {
      const btn = this;
      btn.disabled = true;
      btn.textContent = '⏳ Menyimpan...';

      if (!currentUid) {
        alert('Sesi belum siap. Tunggu sebentar atau refresh halaman.');
        btn.disabled = false;
        btn.textContent = '📊 Lihat Hasil & Simpan';
        return;
      }

      // Kumpulkan jawaban
      const answers = [];
      for (let i = 0; i < shuffledQuestions.length; i++) {
        const radios = document.querySelectorAll(`input[name="q_${i}"]`);
        let selected = null;
        radios.forEach(r => { if (r.checked) selected = r.value; });
        if (selected === null) {
          alert(`Pertanyaan nomor ${i + 1} belum dijawab. Harap lengkapi semua!`);
          btn.disabled = false;
          btn.textContent = '📊 Lihat Hasil & Simpan';
          return;
        }
        answers.push(parseInt(selected, 10));
      }

      // Hitung skor per kategori
      const scoreMap = {};
      categories.forEach(cat => { scoreMap[cat.id] = 0; });

      shuffledQuestions.forEach((item, idx) => {
        if (answers[idx] === 1) {
          scoreMap[item.catId] = (scoreMap[item.catId] || 0) + 1;
        }
      });

      const scores = categories.map(cat => ({
        id: cat.id,
        label: cat.label,
        score: scoreMap[cat.id] || 0,
        desc: cat.desc
      }));

      // Data untuk disimpan
      const dataToSave = {
        nama: pesertaData.nama,
        pendidikan: pesertaData.pendidikan,
        umur: pesertaData.umur,
        scores: scoreMap,
        uid: currentUid,
        timestamp: serverTimestamp()
      };

      try {
        // Simpan ke Firestore
        await addDoc(collection(db, 'riasec_results'), dataToSave);
        console.log('Data berhasil disimpan!');

        // Tampilkan hasil (urut dari skor tertinggi)
        const sorted = scores.slice().sort((a, b) => b.score - a.score);
        resultsContainer.style.display = 'block';
        resultList.innerHTML = '';
        sorted.forEach((item, index) => {
          const div = document.createElement('div');
          div.className = 'result-item';
          const colors = ['#e67e22', '#3498db', '#2ecc71', '#9b59b6', '#f1c40f', '#e74c3c'];
          div.style.borderLeftColor = colors[index % colors.length];
          div.innerHTML = `
            <div style="display:flex; align-items:center; flex-wrap:wrap;">
              <span class="rank-badge">${index + 1}</span>
              <h3>${item.label} <span class="score">(${item.score}/7)</span></h3>
            </div>
            <div class="desc">${item.desc}</div>
          `;
          resultList.appendChild(div);
        });

        testContainer.classList.add('hidden');
        resultsContainer.scrollIntoView({ behavior: 'smooth' });

      } catch (error) {
        console.error('Gagal simpan:', error);
        alert('Terjadi kesalahan saat menyimpan data. Coba lagi nanti.\n' + error.message);
      }

      btn.disabled = false;
      btn.textContent = '📊 Lihat Hasil & Simpan';
    });
  </script>
</body>
</html>
